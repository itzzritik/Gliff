name: Publish

on:
    workflow_dispatch:
        inputs:
            version:
                description: Release bump
                required: true
                default: patch
                type: choice
                options:
                    - patch
                    - minor
                    - major

permissions:
    contents: write
    id-token: write

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    publish:
        if: github.actor != 'github-actions[bot]'
        name: Publish ${{ inputs.version }} version
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
              with:
                  fetch-depth: 0

            - uses: actions/setup-node@v6
              with:
                  node-version: 24
                  registry-url: 'https://registry.npmjs.org'

            - uses: pnpm/action-setup@v4
              with:
                  version: latest
                  run_install: true

            - name: Setup Git & SSH signing
              run: |
                  git config user.email "ritik.jarvis@gmail.com"
                  git config user.name "Jarvis"
                  mkdir -p ~/.ssh/
                  echo "${{ secrets.JARVIS_SSH_KEY }}" > ~/.ssh/id_rsa
                  chmod 600 ~/.ssh/id_rsa
                  ssh-keyscan github.com >> ~/.ssh/known_hosts
                  git config gpg.format ssh
                  git config user.signingkey ~/.ssh/id_rsa
                  git config commit.gpgsign true
                  git config tag.gpgsign true
                  npm config set sign-git-tag true

            - name: Pin Assets SHA
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  set -euo pipefail
                  SHA=$(gh api repos/itzzjarvis/Assets/commits/main --jq .sha)
                  [[ "$SHA" =~ ^[0-9a-f]{40}$ ]] || { echo "❌ Invalid SHA: '$SHA'"; exit 1; }
                  sed -i "s|/Assets@[^/]\+/|/Assets@$SHA/|" src/utils/setup.tsx
                  grep -q "@$SHA/" src/utils/setup.tsx || { echo "❌ URL not rewritten"; exit 1; }
                  echo "📌 CDN → Assets@${SHA:0:7}"

            - name: Bump version & tag
              env:
                  VERSION: ${{ inputs.version }}
              run: |
                  TAG=$(npm version $VERSION --no-git-tag-version)
                  git tag -d $TAG 2>/dev/null || true
                  git push origin :refs/tags/$TAG 2>/dev/null || true
                  git commit -am "publish $TAG"
                  git tag -s -m "publish $TAG" $TAG

            - name: Build
              run: pnpm build

            - name: Publish to npm
              run: npm publish --access public --provenance

            - name: Push
              run: git push --follow-tags
