name: Publish

on:
    workflow_dispatch:
        inputs:
            version:
                description: Release bump
                required: true
                default: patch
                type: choice
                options:
                    - patch
                    - minor
                    - major
    push:
        branches:
            - main

permissions:
    contents: write
    id-token: write
    pages: write

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: false

jobs:
    publish:
        if: ${{ github.event_name == 'workflow_dispatch' || !startsWith(github.event.head_commit.message, 'publish ') }}
        name: ${{ github.event_name == 'workflow_dispatch' && format('Publish {0} version', inputs.version) || 'Build' }}
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
              with:
                  fetch-depth: 0

            - uses: actions/setup-node@v6
              with:
                  node-version: 24
                  registry-url: 'https://registry.npmjs.org'

            - uses: pnpm/action-setup@v6

            - run: pnpm install --frozen-lockfile

            - name: Setup Git & SSH signing
              if: github.event_name == 'workflow_dispatch'
              run: |
                  git config user.email "ritik.jarvis@gmail.com"
                  git config user.name "Jarvis"
                  mkdir -p ~/.ssh/
                  echo "${{ secrets.JARVIS_SSH_KEY }}" > ~/.ssh/id_rsa
                  chmod 600 ~/.ssh/id_rsa
                  ssh-keyscan github.com >> ~/.ssh/known_hosts
                  git config gpg.format ssh
                  git config user.signingkey ~/.ssh/id_rsa
                  git config commit.gpgsign true
                  git config tag.gpgsign true
                  npm config set sign-git-tag true

            - name: Pin Assets SHA
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  set -euo pipefail
                  SHA=$(gh api repos/itzzjarvis/Assets/commits/main --jq .sha)
                  [[ "$SHA" =~ ^[0-9a-f]{40}$ ]] || { echo "❌ Invalid SHA: '$SHA'"; exit 1; }
                  sed -i "s|const SHA = \"[a-f0-9]\{40\}\"|const SHA = \"$SHA\"|" src/utils/assets.ts
                  grep -q "\"$SHA\"" src/utils/assets.ts || { echo "❌ SHA not rewritten"; exit 1; }
                  echo "📌 CDN → Assets@${SHA:0:7}"

            - name: Bump version & tag
              if: github.event_name == 'workflow_dispatch'
              env:
                  VERSION: ${{ inputs.version }}
              run: |
                  TAG=$(npm version $VERSION --no-git-tag-version)
                  git tag -d $TAG 2>/dev/null || true
                  git push origin :refs/tags/$TAG 2>/dev/null || true
                  git commit -am "publish $TAG"
                  git tag -s -m "publish $TAG" $TAG

            - name: Build library
              if: github.event_name == 'workflow_dispatch'
              run: pnpm build

            - name: Build playground
              run: pnpm build:playground

            - name: Write CNAME for custom domain
              run: echo "gliff.ritik.me" > playground-dist/CNAME

            - uses: actions/upload-pages-artifact@v5
              with:
                  path: playground-dist

            - name: Publish to npm
              if: github.event_name == 'workflow_dispatch'
              run: npm publish --access public --provenance

            - name: Push
              if: github.event_name == 'workflow_dispatch'
              run: git push --follow-tags

    deploy:
        name: Deploy
        needs: publish
        runs-on: ubuntu-latest
        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}
        steps:
            - id: deployment
              uses: actions/deploy-pages@v5
